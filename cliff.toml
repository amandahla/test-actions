# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration
#
# Configuration for terraform-provider-rhcs
# Commit format: [JIRA-TICKET] | [TYPE]: <MESSAGE>
# Example: OCM-12345 | feat: add new feature

[changelog]
# Changelog header
header = """
# Changelog

All notable changes to this project will be documented in this file.

"""
# Template for the changelog body
# https://keats.github.io/tera/docs/#introduction
body = """
{%- if version %}
## {{ version | trim_start_matches(pat="v") }} ({{ timestamp | date(format="%b %d, %Y") }})
{%- else %}
## [unreleased]
{%- endif %}
{% for group, commits in commits | group_by(attribute="group") %}
{{ group | striptags | trim | upper }}:
{% if group is containing("ENHANCEMENTS") -%}
* Bug fixes:{% for commit in commits %}{% if commit.raw_message is starting_with("fix:") %}
  * {{ commit.message | upper_first }}{% endif %}{% endfor %}
        {%- for commit in commits -%}
            {%- if commit.raw_message is starting_with("docs:") %}
* Documentation:
  * {{ commit.message | upper_first }}
            {%- endif -%}
        {%- endfor -%}
        {%- for commit in commits -%}
            {%- if commit.raw_message is starting_with("fix:") -%}
            {%- elif commit.raw_message is starting_with("docs:") -%}
            {%- else %}
* {{ commit.message | upper_first }}
            {%- endif -%}
        {%- endfor %}
    {%- else -%}
        {%- for commit in commits %}
* {{ commit.message | upper_first }}
        {%- endfor -%}
    {%- endif %}
{% endfor %}\n
"""
# Remove leading and trailing whitespaces from the changelog
trim = false
# Render body even when there are no releases to process
render_always = true
# Postprocessors for final changelog modifications
postprocessors = []

[git]
# Use conventional commits parsing to extract type and description
conventional_commits = true
# Do not filter unconventional commits
filter_unconventional = false
# Do not require conventional commits
require_conventional = false
# Do not split commits on newlines
split_commits = false

# Preprocessors to transform commit messages from our format to parseable format
# Transform: "OCM-12345 | feat: add feature" -> "feat: add feature"
# This allows commit_parsers to match on type while preserving the message
commit_preprocessors = [
    # Handle standard JIRA ticket format: OCM-XXXXX | type: message -> type: message
    { pattern = '^[A-Z]+-\d+\s*\|\s*(feat|fix|docs|style|refactor|perf|test|build|ci|chore):\s*(.+)$', replace = "$1: $2" },
    # Handle commits without real JIRA ticket (OCM-00000, OCM-000, etc.) -> type: message
    { pattern = '^OCM-0+\s*\|\s*(feat|fix|docs|style|refactor|perf|test|build|ci|chore):\s*(.+)$', replace = "$1: $2" },
]

# Commit parsers to group commits by type
commit_parsers = [
    # Skip test commits - they're not user-facing
    { message = "^test", skip = true },

    # Skip CI/CD commits - they're internal
    { message = "^ci", skip = true },

    # Skip build commits - they're internal
    { message = "^build", skip = true },

    # Skip internal chore commits
    { message = "^chore.*bump changelogs", skip = true },
    { message = "^chore.*konflux", skip = true },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps", skip = true },

    # Features
    { message = "^feat", group = "<!-- 0 -->FEATURES" },

    # Bug fixes - use special marker for template processing
    { message = "^fix", group = "<!-- 1 -->ENHANCEMENTS", default_scope = "bug_fix" },

    # Documentation - use special marker for template processing
    { message = "^docs", group = "<!-- 2 -->ENHANCEMENTS", default_scope = "documentation" },

    # Performance, refactor, and style changes go under ENHANCEMENTS
    { message = "^perf", group = "<!-- 3 -->ENHANCEMENTS" },
    { message = "^refactor", group = "<!-- 3 -->ENHANCEMENTS" },
    { message = "^style", group = "<!-- 3 -->ENHANCEMENTS" },

    # Other chore/maintenance tasks (not skipped)
    { message = "^chore", group = "<!-- 4 -->MAINTENANCE" },

    # Security-related commits
    { body = ".*security", group = "<!-- 5 -->SECURITY" },

    # Reverts
    { message = "^revert", group = "<!-- 6 -->REVERTS" },

    # Skip merge commits
    { message = "^Merge pull request", skip = true },
    { message = "^Merge branch", skip = true },
    { message = "^Merge remote-tracking branch", skip = true },
]

# Protect breaking changes from being skipped
protect_breaking_commits = false
# Filter out commits that don't match any parser
filter_commits = true
# Do not fail on unmatched commits
fail_on_unmatched_commit = false
# Link parsers for external references
link_parsers = [
    # Parse JIRA ticket references
    { pattern = "OCM-(\\d+)", href = "https://issues.redhat.com/browse/OCM-$1" },
]
# Use tags from current branch only
use_branch_tags = false
# Regex pattern for matching git tags
tag_pattern = "v[0-9].*"
# Skip tags in output (but still process their commits)
skip_tags = ""
# Completely ignore prerelease, test, and hotfix tags (don't use them as boundaries)
ignore_tags = ".*(-prerelease\\.|-test|-hotfix).*"
# Sort tags topologically
topo_order = false
# Sort commits topologically
topo_order_commits = false
# Sort commits within groups (newest first matches existing changelog)
sort_commits = "newest"
# Do not process submodules
recurse_submodules = false
