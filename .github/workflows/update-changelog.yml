name: Update Changelog

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Find previous release tag
        id: prev-tag
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          # Get all non-prerelease tags, sort, find the one before current
          PREV_TAG=$(git tag -l 'v*' | grep -v -E '(prerelease|test|hotfix)' | sort -V | grep -B1 "^${CURRENT_TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            # If no previous tag found, get the latest release tag
            PREV_TAG=$(git tag -l 'v*' | grep -v -E '(prerelease|test|hotfix)' | sort -V | tail -1)
          fi
          echo "Auto-detected previous tag: $PREV_TAG"
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --verbose ${{ steps.prev-tag.outputs.prev_tag }}..${{ github.ref_name }} --prepend CHANGELOG.md

      - name: Create PR with changelog
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: changelog-${{ github.ref_name }}
          base: main
          title: "OCM-00000 | chore: add changelog for ${{ github.ref_name }}"
          body: |
            ## Changelog for ${{ github.ref_name }}

            Auto-generated changelog entry for release ${{ github.ref_name }}.

            **Release tag**: `${{ github.ref_name }}`
            **Previous tag**: `${{ steps.prev-tag.outputs.prev_tag }}`

            Auto-generated by GitHub Actions.
          commit-message: "OCM-00000 | chore: add changelog for ${{ github.ref_name }}"
          labels: changelog,automated
          delete-branch: true
          add-paths: "CHANGELOG.md"
          sign-commits: true
