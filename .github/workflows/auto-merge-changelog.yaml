name: Auto-merge changelog PRs
on:
  pull_request:
    types:
      - labeled
      - unlabeled
      - synchronize
      - opened
      - edited
      - ready_for_review
      - reopened
      - unlocked
jobs:
  approve_pr:
    name: Approve changelog PR
    runs-on: ubuntu-latest
    steps:
      - name: Show author
        run: |
          echo ${{ github.event.pull_request.user.login }}
      - name: Approve bot PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: github.event.pull_request.user.login == 'github-actions[bot]'
        uses: actions/github-script@v8.0.0
        with:
          script: |
            github.rest.pulls.createReview({
              owner: context.payload.repository.full_name.split('/')[0],
              repo: context.payload.repository.full_name.split('/')[1],
              pull_number: context.payload.number,
              event: 'APPROVE'
            })
  auto-merge:
    needs: approve_pr
    name: Auto-merge changelog PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - id: automerge
        name: automerge
        uses: "pascalgn/automerge-action@v0.16.4"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          MERGE_LABELS: "automated,changelog"
          MERGE_METHOD: "merge"
          MERGE_DELETE_BRANCH: "true"
