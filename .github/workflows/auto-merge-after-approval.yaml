name: Auto-merge after approval

on:
  pull_request_review:
    types:
      - submitted
  pull_request:
    types:
      - labeled

jobs:
  auto-merge:
    name: Auto-merge changelog PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: |
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      contains(github.event.pull_request.labels.*.name, 'automated') &&
      contains(github.event.pull_request.labels.*.name, 'changelog')
    steps:
      - id: automerge
        name: automerge
        uses: "pascalgn/automerge-action@v0.16.4"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          MERGE_LABELS: "automated,changelog"
          MERGE_METHOD: "merge"
          MERGE_DELETE_BRANCH: "true"
