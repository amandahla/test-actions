name: Auto-merge changelog PRs
on:
  pull_request:
    types:
      - labeled
      - unlabeled
      - synchronize
      - opened
      - edited
      - ready_for_review
      - reopened
      - unlocked
  status: {}
jobs:
  auto-approve:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    if: github.event.label.name == 'changelog'
    steps:
      - uses: "hmarr/auto-approve-action@v4"
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          allow-users: "github-actions[bot]"
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - id: automerge
        name: automerge
        uses: "pascalgn/automerge-action@v0.16.4"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          MERGE_LABELS: "automated,changelog"
          MERGE_METHOD: "merge"
          MERGE_DELETE_BRANCH: "true"
